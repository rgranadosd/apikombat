  /tickets/precios:
    get:
      tags:
      - Tickets
      summary: Consultar precios de tickets
      operationId: getPrecios
      security:
      - ApiKeyAuth: []
      parameters:
      - name: origen
        in: query
        required: true
        schema:
          type: string
      - name: destino
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                origen: Retiro
                destino: Tigre
                precios:
                - clase: Economy
                  precio: 1200
                - clase: Pullman
                  precio: 2500
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
